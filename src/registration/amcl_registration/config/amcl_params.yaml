amcl:
  ros__parameters:
    use_sim_time: false

    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"

    scan_topic: "/scan"
    map_topic: "/map"
    tf_broadcast: true

    # 第一次调试建议 false，用 RViz 的 2D Pose Estimate 手动给初始位姿
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: true

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    min_particles: 500
    max_particles: 3000
    max_beams: 80

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_min_range: 0.45
    laser_max_range: 10.0

    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    update_min_d: 0.10
    update_min_a: 0.10
    resample_interval: 1
    transform_tolerance: 1.0
    save_pose_rate: 0.5